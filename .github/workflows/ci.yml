name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install --upgrade pip setuptools
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --cov=skyprice --cov-fail-under=80 --cov-config=pyproject.toml
